name: Research CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test deps
        run: pip install pytest
      - name: Run pipeline tests (E2E / Playwright excluded via pytest config)
        run: pytest -q

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -r requirements.txt || true
      - name: Regenerate data + report
        run: |
          python data/seed.py
          python data/verify.py
          python build_report.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
      - name: Verify deployment via gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Page URL: ${{ steps.deploy.outputs.page_url }}"
          gh api repos/${{ github.repository }}/pages
          curl -fsS -o /dev/null -w "Live report HTTP %{http_code}\n" "${{ steps.deploy.outputs.page_url }}report.html"
